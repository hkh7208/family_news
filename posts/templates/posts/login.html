{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 태선,제인이네 가족신문</title>
    <link rel="stylesheet" href="{% static 'posts/home.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="header-top">
            <div class="site-title-wrap">
                <img class="site-title-icon" src="{% static 'posts/icons/newspaper.png' %}" alt="신문 아이콘" width="70" height="70">
                <h1>태선,제인이네 가족신문</h1>
            </div>
        </div>
        <p>가족 공간 로그인</p>
    </header>

    <section class="form-section">
        <div class="form-card">
            <h2 class="form-title">로그인</h2>
            {% if form.non_field_errors %}
            <div class="form-errors">{{ form.non_field_errors }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button class="menu-btn" type="submit">로그인</button>
                </div>
            </form>
            <p class="form-helper-link">
                계정이 없으신가요?
                <a href="{% url 'family_signup' %}">회원가입 신청</a>
            </p>
        </div>
    </section>
    {% include 'posts/_site_footer.html' %}
</body>
</html>
