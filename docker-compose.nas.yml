version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family_news_web
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --settings=config.settings.prod &&
             python manage.py collectstatic --noinput --settings=config.settings.prod &&
             DJANGO_SETTINGS_MODULE=config.settings.prod gunicorn config.wsgi:application --config /app/gunicorn.conf.py"
    volumes:
      - /volume1/web/family_news/app:/app
      - /volume1/web/family_news/media:/app/media
      - /volume1/web/family_news/staticfiles:/app/staticfiles
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/health/'); sys.exit(0 if r.status==200 else 1)\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    container_name: family_news_nginx
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8090:80"
    volumes:
      - ./deploy/nginx.nas.conf:/etc/nginx/conf.d/default.conf:ro
      - /volume1/web/family_news/media:/app/media:ro
      - /volume1/web/family_news/staticfiles:/app/staticfiles:ro
    restart: always
